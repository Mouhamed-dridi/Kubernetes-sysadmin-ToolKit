<!DOCTYPE html>
<html>

<head>
    <title>Login Hash</title>
    <style>
        body {
            font-family: Arial;
            background: #eef;
            text-align: center;
            padding: 50px;
        }

        input,
        button {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
        }
    </style>
</head>

<body>
    <h2>Login with Hash</h2>
    <input type="text" id="hash" placeholder="Enter Hash">
    <button onclick="checkHash()">Submit</button>

    <script>
        async function checkHash() {
            // Secret mounted as file: /hash/loginhash
            const res = await fetch("hash/loginhash");
            const secretHash = await res.text();
            const input = document.getElementById("hash").value;

            if (input === secretHash.trim()) {
                alert("✅ Hash correct!");
            } else {
                alert("❌ Invalid hash!");
            }
        }
    </script>
</body>

</html>
