<!DOCTYPE html>
<html>

<head>
  <title>Login Auth</title>
  <style>
    body {
      font-family: Arial;
      background: #fef;
      text-align: center;
      padding: 50px;
    }

    input,
    button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
    }

    button {
      background: #00c6ff;
      color: white;
      border: none;
    }
  </style>
</head>

<body>
  <h2>Login with Username/Password</h2>
  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="checkAuth()">Login</button>

  <script>
    async function checkAuth() {
      const u = document.getElementById("username").value;
      const p = document.getElementById("password").value;

      const userRes = await fetch("auth/username");
      const passRes = await fetch("auth/password");

      const secretUser = (await userRes.text()).trim();
      const secretPass = (await passRes.text()).trim();

      if (u === secretUser && p === secretPass) {
        alert("✅ Login successful!");
      } else {
        alert("❌ Wrong credentials!");
      }
    }
  </script>
</body>

</html>
