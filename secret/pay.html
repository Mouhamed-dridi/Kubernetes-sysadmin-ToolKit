<!DOCTYPE html>
<html>

<head>
    <title>Payment</title>
    <style>
        body {
            font-family: Arial;
            background: #efe;
            text-align: center;
            padding: 50px;
        }

        input,
        button {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
        }

        button {
            background: #4caf50;
            color: white;
            border: none;
        }
    </style>
</head>

<body>
    <h2>Payment Form</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="text" id="secnumber" placeholder="Sec Number"><br>
    <input type="text" id="rib" placeholder="RIB"><br>
    <input type="text" id="dateRF" placeholder="Date RF"><br>
    <input type="text" id="dateEND" placeholder="Date END"><br>
    <button onclick="checkPay()">Pay</button>

    <script>
        async function checkPay() {
            const u = document.getElementById("username").value;
            const s = document.getElementById("secnumber").value;
            const r = document.getElementById("rib").value;
            const drf = document.getElementById("dateRF").value;
            const dend = document.getElementById("dateEND").value;

            const userRes = await fetch("pay/username");
            const secRes = await fetch("pay/secnumber");
            const ribRes = await fetch("pay/RIB");
            const drfRes = await fetch("pay/dateRF");
            const dendRes = await fetch("pay/dateEND");

            const secretUser = (await userRes.text()).trim();
            const secretSec = (await secRes.text()).trim();
            const secretRib = (await ribRes.text()).trim();
            const secretDrf = (await drfRes.text()).trim();
            const secretDend = (await dendRes.text()).trim();

            if (u === secretUser && s === secretSec && r === secretRib && drf === secretDrf && dend === secretDend) {
                alert("✅ Payment data verified!");
            } else {
                alert("❌ Payment data mismatch!");
            }
        }
    </script>
</body>

</html>
