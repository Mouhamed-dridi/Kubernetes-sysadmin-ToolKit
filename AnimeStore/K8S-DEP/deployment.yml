apiVersion: apps/v1
kind: Deployment
metadata:
  name: anime-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anime
  template:
    metadata:
      labels:
        app: anime
    spec:
      containers:
      - name: anime
        image: animev1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
