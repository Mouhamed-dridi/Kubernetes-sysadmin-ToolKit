<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            width: 300px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #00c6ff;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="site" placeholder="Site">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkLogin()">Submit</button>
    </div>

    <script>
        function checkLogin() {
            // These values will eventually come from ConfigMap (env vars)
            const SITE = "usa";
            const USERNAME = "alex";
            const PASSWORD = "IMP*1254YGRtsP";

            const siteInput = document.getElementById("site").value;
            const userInput = document.getElementById("username").value;
            const passInput = document.getElementById("password").value;

            if (siteInput === SITE && userInput === USERNAME && passInput === PASSWORD) {
                alert("✅ Login Successful!");
            } else {
                alert("❌ Login Failed!");
            }
        }
    </script>
</body>

</html>
